[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200

[fuzz]
runs = 256

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"

# Ver más opciones de configuración:
# https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
